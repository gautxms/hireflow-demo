<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
      <tr><td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background:#fff;border-radius:12px;overflow:hidden;">
          <tr><td style="background:#111827;padding:20px;text-align:center;"><img src="{{logoUrl}}" alt="{{companyName}}" style="max-height:40px;" /></td></tr>
          <tr><td style="padding:28px;">
            <h1 style="margin:0 0 14px 0;font-size:24px;">Reset your password</h1>
            <p style="line-height:1.6;margin:0 0 16px 0;">Hi {{firstName}}, we received a request to reset your password.</p>
            <p style="line-height:1.6;margin:0 0 24px 0;">For security, this link expires in 1 hour.</p>
            <p style="text-align:center;margin:0 0 20px 0;"><a href="{{resetUrl}}" style="display:inline-block;padding:12px 20px;background:#2563eb;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;">Reset Password</a></p>
            <p style="margin:0;line-height:1.6;">If you didn't request this, you can ignore this email.</p>
          </td></tr>
          <tr><td style="padding:18px 28px;background:#f9fafb;color:#6b7280;font-size:12px;line-height:1.6;">© {{year}} {{companyName}} · <a href="{{unsubscribeUrl}}">Unsubscribe</a></td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
