<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background:#ffffff;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="background:#111827;padding:20px;text-align:center;">
                <img src="{{logoUrl}}" alt="{{companyName}}" style="max-height:40px;" />
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                <h1 style="margin:0 0 16px 0;font-size:24px;">Welcome to {{companyName}} 👋</h1>
                <p style="margin:0 0 16px 0;line-height:1.6;">Hi {{firstName}}, your account is now verified and ready to use.</p>
                <p style="margin:0 0 24px 0;line-height:1.6;">Start screening candidates faster with AI-powered workflows designed for modern hiring teams.</p>
                <p style="margin:0 0 24px 0;text-align:center;">
                  <a href="{{dashboardUrl}}" style="display:inline-block;padding:12px 20px;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600;">Go to Dashboard</a>
                </p>
                <p style="margin:0;line-height:1.6;">Need help? Reach us at <a href="mailto:{{supportEmail}}">{{supportEmail}}</a>.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px;background:#f9fafb;color:#6b7280;font-size:12px;line-height:1.6;">
                © {{year}} {{companyName}} · <a href="{{unsubscribeUrl}}">Unsubscribe</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
